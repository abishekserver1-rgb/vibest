<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Vathiyar Notes</title>
<style>
body{margin:0;font-family:system-ui;background:#0f172a;color:#e2e8f0}
header{padding:16px;background:#1e293b;display:flex;align-items:center;gap:12px}
header img{width:40px;height:40px;border-radius:50%}
h1{font-size:18px;margin:0}
main{padding:16px}
textarea{width:100%;height:60vh;background:#0b1220;color:#fff;border:1px solid #334155;border-radius:12px;padding:12px;font-size:16px}
button{margin-top:12px;padding:10px 16px;border:none;border-radius:10px;background:#3b82f6;color:white;font-size:16px}
small{opacity:.7}
</style>
</head>
<body>
<header>
<img src="icon.png">
<h1>Vathiyar Notes</h1>
</header>
<main>
<textarea id="note" placeholder="Type your notes here..."></textarea>
<button onclick="save()">Save</button>
<small id="status"></small>
</main>
<script>
const n=document.getElementById('note');
n.value=localStorage.getItem('vathiyar')||'';
function save(){localStorage.setItem('vathiyar',n.value);document.getElementById('status').textContent='Saved '+new Date().toLocaleTimeString();}
</script>
</body>
</html>
